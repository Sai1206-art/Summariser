# Daily faceless-channel video production (AutoTube).
#
# Default: manual trigger only. Uncomment `schedule:` to run automatically.
# The produced package is attached as a workflow artifact for review;
# uploading to YouTube from CI requires committing to auto_upload and adding
# a pre-authorized YOUTUBE_TOKEN_JSON secret (run `python run.py auth` locally
# once and copy state/youtube_token.json).

name: youtube-daily

on:
  workflow_dispatch:
    inputs:
      format:
        description: "Video format"
        default: "long"
        type: choice
        options: [long, short]
  # schedule:
  #   - cron: "0 9 * * *"   # 09:00 UTC daily

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: youtube-automation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Produce video package
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: python run.py produce --format "${{ inputs.format || 'long' }}"

      - name: Upload package for review
        uses: actions/upload-artifact@v4
        with:
          name: video-package
          path: |
            youtube-automation/output/**
            !youtube-automation/output/**/work/**
          retention-days: 7
