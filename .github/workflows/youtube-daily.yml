# Cloud production for the faceless channel (AutoTube).
#
# Runs entirely on GitHub's servers — no local machine needed.
#
# Triggers:
#   - Daily at 09:00 UTC (cron)  [requires this file on the default branch]
#   - Manually from the Actions tab (workflow_dispatch)
#
# Repository secrets (Settings -> Secrets and variables -> Actions):
#   ANTHROPIC_API_KEY     required for original scripts (never publish without it)
#   PEXELS_API_KEY        stock footage (free key)
#   PIXABAY_API_KEY       fallback footage (optional)
#   YOUTUBE_TOKEN_JSON    contents of state/youtube_token.json after running
#                         `python run.py auth` once locally (needed only for
#                         uploading from CI)
#
# Repository variable:
#   AUTOTUBE_UPLOAD=true  lets SCHEDULED runs upload to YouTube automatically
#                         (videos go to the next schedule slot from channel.yaml).
#                         Leave unset to keep the human-review flow: the video
#                         package is attached as a workflow artifact instead.

name: youtube-daily

on:
  workflow_dispatch:
    inputs:
      format:
        description: "Video format"
        default: "news"
        type: choice
        options: [news, long, short]
      upload:
        description: "Upload to YouTube after producing"
        default: false
        type: boolean
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write   # lets the run commit state/history.json back (topic dedupe)

concurrency:
  group: youtube-daily
  cancel-in-progress: false

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: youtube-automation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: youtube-automation/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q fonts-dejavu-core
          pip install -r requirements.txt

      - name: Produce video package
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
        run: python run.py produce --format "${{ inputs.format || 'news' }}"

      - name: Upload to YouTube
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          UPLOAD: ${{ (github.event_name == 'workflow_dispatch' && inputs.upload) || (github.event_name == 'schedule' && vars.AUTOTUBE_UPLOAD == 'true') }}
        run: |
          if [ "$UPLOAD" != "true" ]; then
            echo "Upload disabled — package attached as artifact for review."; exit 0
          fi
          if [ -z "$YOUTUBE_TOKEN_JSON" ]; then
            echo "::warning::AUTOTUBE_UPLOAD is on but YOUTUBE_TOKEN_JSON secret is missing — skipping upload."; exit 0
          fi
          mkdir -p state
          printf '%s' "$YOUTUBE_TOKEN_JSON" > state/youtube_token.json
          python run.py upload --latest --schedule-next

      - name: Persist topic history (prevents repeats across cloud runs)
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "autotube-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add youtube-automation/state/history.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(autotube): update topic/upload history [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Attach package for review
        uses: actions/upload-artifact@v4
        with:
          name: video-package-${{ github.run_number }}
          path: |
            youtube-automation/output/**
            !youtube-automation/output/**/work/**
          retention-days: 7
