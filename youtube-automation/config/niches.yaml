    ship 3+ videos a week.
  audience: "tech-curious 18-40 year olds tracking AI and the future of work"
  tone: "energetic, curious, hype-free; explain like a smart friend, cite what's real vs speculation"
  voice: en-US-GuyNeural
  music_mood: "futuristic synth, glitch"
  thumbnail:
    bg_color: "#0a0e2a"
    accent_color: "#4cc9f0"
    text_color: "#ffffff"
  visual_style: "server rooms, robots, neon circuits, futuristic cities, code on screens, labs"
