history:
  label: "History & Mysteries"
  why: >
    Deep-watch niche with the longest average view durations — ideal for
    accumulating watch hours. RPM ~$5-10. Slower growth but extremely durable
    back-catalog views.
  audience: "25-60 year olds who love documentaries and unsolved stories"
  tone: "narrative documentary style; build tension, respect the facts, no sensationalism"
  voice: en-GB-RyanNeural
  music_mood: "orchestral tension, ambient drones"
  thumbnail:
    bg_color: "#1a120b"
    accent_color: "#e07a2f"
    text_color: "#f5ecd7"
  visual_style: "old maps, ruins, archives, candlelight, museums, storms, ancient architecture"
  hashtags: ["#history", "#documentary", "#mystery"]
  title_patterns:
    - "The {x} History Tried to Forget"
    - "What Really Happened at {x}"
    - "{x}: The Untold Story"
    - "How {x} Changed the World Forever"
  topic_seeds:
