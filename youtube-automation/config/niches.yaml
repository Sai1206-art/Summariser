# ============================================================================
# Niche presets. Each preset drives topic ideation, script tone, voice,
# stock-footage queries, SEO and thumbnail styling.
#
# RPM figures are rough US-audience ranges for planning only.
# ============================================================================

ai_news:
  label: "Daily AI News"
  why: >
    A daily AI-news show is one of the fastest-growing formats on YouTube: huge
    search demand, fresh topic every day, and strong RPM (~$8-15, tech
    audience). An avatar presenter + infographics reads as a real channel, not
    "AI slop". Produced with live web research so every episode is current and
    sourced. Uses `produce --format news`.
  audience: "tech-curious 18-45 year olds who want a fast, trustworthy daily AI briefing"
  tone: "sharp, energetic news-anchor delivery; hype-free; separate confirmed facts from speculation"
  voice: en-US-GuyNeural            # used only in voice-fallback mode (no avatar key)
  music_mood: "futuristic synth, subtle newsroom bed"
  thumbnail:
    bg_color: "#0a0e2a"
    accent_color: "#4cc9f0"
    text_color: "#ffffff"
  visual_style: "server rooms, robots, neon circuits, data centers, code on screens, futuristic cities, labs"
  hashtags: ["#ai", "#ainews", "#artificialintelligence", "#technews"]
  # No topic_seeds: topics come from live web search each day.

psychology:
  label: "Psychology & Human Behavior"
  why: >
    Fast-growing faceless niche with evergreen demand, extremely high retention
    (people finish "why your brain does X" videos), low production cost and a
    broad 18-45 audience. RPM ~$4-9. The best pick for reaching 4,000 watch
    hours quickly.
  audience: "curious 18-45 year olds interested in self-improvement and how the mind works"
  tone: "calm, intriguing, slightly mysterious; grounded in real research, never preachy"
  voice: en-US-ChristopherNeural
  music_mood: "dark ambient, minimal piano"
  thumbnail:
    bg_color: "#0d1321"
    accent_color: "#ffd166"
    text_color: "#ffffff"
  visual_style: "moody cinematic b-roll, silhouettes, brain imagery, city nights, rain windows, chess, mirrors"
  hashtags: ["#psychology", "#humanbehavior", "#selfimprovement"]
  title_patterns:
    - "Why Your Brain {does_x}"
    - "The Psychology Behind {x}"
    - "{n} Signs Someone Is {x}"
    - "How {x} Secretly Controls You"
  topic_seeds:
    - "why smart people stay quiet in groups"
    - "the psychology of first impressions"
    - "how dopamine detox actually works"
    - "why we procrastinate on things we love"
    - "signs of a highly observant person"
    - "the spotlight effect: nobody is watching you"
    - "why silence makes people uncomfortable"
    - "how your brain decides who to trust in 7 seconds"
    - "the psychology of luxury brands"
    - "why we remember embarrassing moments forever"
    - "dark psychology tricks used in advertising"
    - "why eye contact feels so intense"
    - "the habits of people who never get manipulated"
    - "why your best ideas come in the shower"
    - "how colors secretly change your decisions"
    - "the psychology of people who prefer being alone"
    - "why we mirror people we like"
    - "how scarcity makes you want things more"
    - "the real reason you can't stop scrolling"
    - "why deadlines make you more creative"
    - "psychology of charisma: why some people pull attention"
    - "why your memory rewrites the past"
    - "the anchoring effect: the first number wins"
    - "why we trust confident people even when they're wrong"

finance:
  label: "Personal Finance & Money"
  why: >
    Highest RPM of any mainstream niche (~$12-30) because advertisers pay a
    premium for finance audiences. More competitive and YMYL-sensitive: scripts
    must be educational, sourced and non-advisory. Best combined with
    psychology-style storytelling.
  audience: "20-45 year olds trying to earn, save and invest smarter"
  tone: "clear, direct, practical; educational not advisory; no hype, no get-rich-quick"
  voice: en-US-GuyNeural
  music_mood: "upbeat minimal electronic"
  thumbnail:
    bg_color: "#07231c"
    accent_color: "#3ddc84"
    text_color: "#ffffff"
  visual_style: "city skylines, cash close-ups, charts on screens, offices, watches, calm luxury"
  hashtags: ["#personalfinance", "#money", "#investing"]
  title_patterns:
    - "How {x} Keeps You Poor"
    - "The {n} Money Rules Nobody Taught You"
    - "Why the Rich {do_x}"
    - "{x}, Explained in {n} Minutes"
  topic_seeds:
    - "the psychology of why we buy things we don't need"
    - "how compound interest actually works"
    - "lifestyle inflation: the silent salary killer"
    - "why the rich buy assets and the poor buy liabilities"
    - "the 50/30/20 rule and when it fails"
    - "how credit scores really work"
    - "why saving alone will never make you wealthy"
    - "the latte factor is a lie: what actually matters"
    - "how inflation quietly taxes your savings"
    - "why most people lose money trading"
    - "the real cost of buying a new car"
    - "emergency funds: how much is actually enough"
    - "why lottery winners go broke"
    - "the index fund strategy explained simply"
    - "how banks make money from your deposits"
    - "why your first $10,000 is the hardest"
    - "the hidden fees eating your investments"
    - "renting vs buying: the math nobody shows you"
    - "how the 1% legally pay less tax"
    - "why budgets fail and what works instead"

