    - "the dancing plague of 1518"
    - "how the silk road really worked"
    - "the lost colony of roanoke"
    - "the great emu war"
    - "why the bronze age collapsed"
    - "the man who saved the world by doing nothing"
    - "the london beer flood"
    - "how venice was built on water"
    - "the year without a summer"
    - "the antikythera mechanism: an ancient computer"
    - "carrington event: the solar storm that broke the world"
    - "the real pirates of the caribbean"
    - "how spices started empires"
    - "the halifax explosion"
    - "why easter island's civilization vanished"
    - "the oracle of delphi: science behind the myth"
    - "the great molasses flood of boston"

space:
  label: "Space & Science"
  why: >
    Evergreen fascination, high retention, family-safe advertiser-friendly
    content. RPM ~$6-12. Stock space footage is plentiful and stunning, which
    makes production quality look expensive.
  audience: "all-ages science-curious viewers"
  tone: "awe-driven but precise; make scale feel visceral; separate fact from hypothesis"
  voice: en-US-ChristopherNeural
  music_mood: "epic ambient, slow builds"
  thumbnail:
    bg_color: "#02010f"
    accent_color: "#9d4edd"
    text_color: "#ffffff"
  visual_style: "nebulas, rocket launches, planets, telescopes, astronauts, night skies, deep ocean"
  hashtags: ["#space", "#science", "#universe"]
  title_patterns:
    - "What's Really Inside {x}"
    - "The Terrifying Scale of {x}"
    - "Why {x} Shouldn't Exist"
    - "{x}, Explained"
  topic_seeds:
    - "what happens inside a black hole"
    - "the terrifying scale of the universe"
    - "why we can't go faster than light"
    - "the great filter: where is everybody"
    - "how the james webb telescope sees the past"
    - "what the sun will do to earth eventually"
    - "rogue planets: worlds without stars"
    - "the sound of space: what we've actually recorded"
    - "why venus went wrong"
    - "the oceans hiding inside icy moons"
    - "how we know the big bang happened"
    - "neutron stars: the densest things that exist"
    - "the voyager probes: humanity's farthest machines"
    - "why mars lost its atmosphere"
    - "gravitational waves explained"
    - "the dark matter mystery"
